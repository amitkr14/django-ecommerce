{% extends 'myapp/base.html' %}

{% block body %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded shadow">
    <h2 class="text-2xl font-bold mb-6 text-center">Enter OTP</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div class="p-4 mb-4 text-sm text-blue-700 bg-blue-100 rounded">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label class="block text-gray-700 text-sm font-bold mb-2">6-Digit OTP</label>
        <input type="text" name="otp" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-4">
        
        <button type="submit" class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded hover:bg-blue-600">
            Verify
        </button>
    </form>
</div>
{% endblock %}
