{% extends 'myapp/base.html' %}

{% block body %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded shadow">
    <h2 class="text-2xl font-bold mb-6 text-center">Create New Password</h2>
    
    <form method="POST">
        {% csrf_token %}
        <label class="block text-gray-700 text-sm font-bold mb-2">New Password</label>
        <input type="password" name="new_password" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-4">
        
        <label class="block text-gray-700 text-sm font-bold mb-2">Confirm Password</label>
        <input type="password" name="confirm_password" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-6">
        
        <button type="submit" class="w-full bg-green-500 text-white font-bold py-2 px-4 rounded hover:bg-green-600">
            Save Password
        </button>
    </form>
</div>
{% endblock %}
