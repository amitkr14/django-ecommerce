{% extends 'myapp/base.html' %}

{% block body %}
<div class="max-w-2xl mx-auto bg-white p-8 border rounded shadow-sm mt-10">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h2 class="text-2xl font-bold text-gray-800">Edit Product: {{ product.name }}</h2>
        <a href="{% url 'seller_dashboard' %}" class="text-gray-500 hover:underline">&larr; Back to Dashboard</a>
    </div>
    
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded mt-6 hover:bg-blue-700">
            Save Changes
        </button>
    </form>
</div>
{% endblock %}
