{% extends 'myapp/base.html' %}

{% block body %}
<div class="max-w-md mx-auto bg-white p-8 border rounded shadow-sm mt-10">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Seller Login</h2>
    
    <form method="POST" action="{% url 'seller_login' %}">
        {% csrf_token %}
        <div class="space-y-4">
            {{ form.as_p }}
        </div>
        <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded mt-6 hover:bg-green-700">
            Login to Dashboard
        </button>
    </form>
</div>
{% endblock %}
